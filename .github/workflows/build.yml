name: Build Extension
on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
      - run: npm ci
      - run: npm run build
      - name: Zip Build
        run: cd dist && zip -r ../snapscroll-extension.zip * .* -x "../*"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapscroll-extension
          path: snapscroll-extension.zip
